<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Stack</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
        <style>
            body{
                background-color: #222;
                color:white;
                font-family: "Inter", sans-serif;
                text-align: center;
                margin-top:50px;
            }
            canvas{
                background: #111;
                border:4px solid white;
                display:block;
                margin:0 auto;
                border-radius: 10px;
            }
            h1{
                margin-bottom:5px;
                font-size: 48px;
                font-weight:800;
                letter-spacing: 4px;
            }
            p{
                color:#bbb;
                font-size:18px;
                font-weight:500;
                margin-bottom:20px;
            }

        </style>
    </head>
    <body>
        <h1>STACK</h1>
        <p>Press SPACEBAR to drop the block</p>
        <canvas id="myCanvas" width="400" height="500"></canvas>
        <button id="restartBtn" style="
        display:none;
        margin-top:20px;
        padding: 12px 24px;
        font-size: 18px;
        background:rgb(23, 40, 116);
        color:white;
        border:2px solid rgb(255, 255, 255);
        border-radius: 2px;
        cursor:pointer;
        ">
        Play Again
        </button>
        <script>
            var canvas=document.getElementById("myCanvas");
            var ctx=canvas.getContext("2d");
            var restartBtn=document.getElementById("restartBtn");
            var blockHeight=35;
            var gameSpeed=4;
            var isGameOver=false;
            var score=0;
            var currentBlock={x:0, y:400, width:150, direction:1};
            var stackedBlocks=[
                {x:125, y:435, width:150}
            ];
            function drawEverything(){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle="cyan";
                for(var i=0; i<stackedBlocks.length;i++){
                    ctx.fillRect(stackedBlocks[i].x, stackedBlocks[i].y, stackedBlocks[i].width, blockHeight);
                    ctx.strokeStyle="white";
                    ctx.strokeRect(stackedBlocks[i].x, stackedBlocks[i].y, stackedBlocks[i].width, blockHeight)
                }
                if(!isGameOver){
                    ctx.fillStyle="magenta";
                    ctx.fillRect(currentBlock.x,currentBlock.y,currentBlock.width,blockHeight);
                    ctx.strokeStyle="white";
                    ctx.strokeRect(currentBlock.x,currentBlock.y,currentBlock.width,blockHeight);
                }
                ctx.fillStyle="white";
                ctx.font="600 20px Inter";
                ctx.fillText("Score: "+score,20,30);

                if(isGameOver){
                    ctx.fillStyle="rgba(0,0,0,0.75)";
                    ctx.fillRect(0,0,canvas.width,canvas.height);
                    ctx.fillStyle="red";
                    ctx.font="800 40px Inter";
                    ctx.fillText("GAME OVER",90, 230);
                    ctx.fillStyle="white";
                    ctx.font="600 20px Inter";
                    ctx.fillText("Final Score: "+score,140,280);
                    ctx.fillText("Play Again!",150,330);
                }
            }
            function updateGame(){
                if(isGameOver)return;

                currentBlock.x += gameSpeed *currentBlock.direction;
                if(currentBlock.x +currentBlock.width >= canvas.width){
                    currentBlock.direction=-1;
                }
                if(currentBlock.x <=0){
                    currentBlock.direction=1;
                }
            }
            function restartGame(){
                gamespeed=4;
                isGameOver=false;
                score=0;
                currentBlock={
                    x:0,
                    y:400,
                    width:150,
                    direction:1
                };
                stackedBlocks=[{x:125, y:435, width:150}];
                restartBtn.style.display="none";
            }
            function gameLoop(){
                updateGame();
                drawEverything();
                requestAnimationFrame(gameLoop);
            }
            window.addEventListener("keydown",function(event){
                if(event.code==="Space"){
                    event.preventDefault();
                    if(isGameOver)return;
                    var targetBlock=stackedBlocks[stackedBlocks.length-1];
                    var overlapx1=Math.max(currentBlock.x,targetBlock.x)
                    var overlapx2=Math.min(currentBlock.x +currentBlock.width,targetBlock.x+targetBlock.width);
                    var overLapWidth=overlapx2-overlapx1;
                    if(overLapWidth>=0){
                        stackedBlocks.push({
                            x:overlapx1,
                            y:currentBlock.y,
                            width:overLapWidth
                        });
                        score++;
                        gameSpeed+=0.1;
                        currentBlock.y-=blockHeight;
                        currentBlock.width=overLapWidth;
                        currentBlock.x=0;
                        currentBlock.direction=1;
                        if(currentBlock.y<100){
                            for(var i=0;i<stackedBlocks.length;i++){
                                stackedBlocks[i].y+=blockHeight;
                            }
                            currentBlock.y+=blockHeight;
                        }
                    }
                    else{
                        isGameOver=true;
                        restartBtn.style.display="inline-block";
                    }
                }
            });
            restartBtn.addEventListener("click",function(){
                restartGame();
            });
            gameLoop();
        </script>
    </body>
</html>
